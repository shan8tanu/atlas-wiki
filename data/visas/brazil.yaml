country: Brazil
iso_code: BR
visa_difficulty: 2
visa_type: Standard Visa
max_stay: 90 days
entry_type: "Multiple Entry"
visa_validity: "2 years from issue"
passport_validity_months: 6
blank_pages_required: 2
region: Americas
authority:
  name: Embassy of Brazil, New Delhi
  processor: Embassy
  official_portal: https://www.gov.br/mre/
visa_types:
  evisa:
    label: e-Visa
    documents:
      - Online application form submitted via the official visa portal
      - Scanned copy of passport bio page — JPEG or PDF, clearly legible
      - Digital photograph — white background, JPEG, minimum 200 KB
      - Return flight booking reference number
      - Hotel or accommodation booking reference number
  standard_visa:
    label: Standard Visa (Embassy)
    documents:
      - Completed visa application form — printed, signed, and dated
      - Appointment confirmation slip from the embassy or authorised agent
      - Confirmed return flight tickets (printed copy)
      - Proof of accommodation — hotel booking confirmation or invitation letter
      - Travel insurance covering the full stay duration
  long_term:
    label: Long-stay Visa
    documents:
      - Completed long-stay visa application (consulate-specific form)
      - Employer NOC confirming leave of absence for the full stay period
      - Proof of long-term accommodation — lease agreement or host invitation letter
      - Travel insurance covering the full extended stay duration
      - Sponsor letter or proof of fixed deposits / investment holdings

requirements:
  visa_fee_inr: 6700
  processing_days: 15
  photo_specs:
    dimensions: 35x45mm
    bg_color: White
  financial_proof: Confirmed return ticket, hotel booking or invitation letter, bank
    statements for the last 3 months, and travel insurance. Apply in person at the
    Brazilian Embassy, New Delhi.
  financial_documents:
  - Bank statements for the last 3 months
  occupation_documents:
    self_employed:
      - Bank statements for the last 3 months
      - ITR for 2 years (business income)
      - Business registration certificate / trade licence
      - CA-certified audited balance sheet for 2 years
    business_owner:
      - Personal + business bank statements for the last 3 months
      - Personal + company ITR for 2 years
      - Certificate of incorporation / MSME registration
      - Company audited financials for 2 years
      - Director identification proof (DIN)
    student:
      - Admission letter or valid student ID card
      - Sponsoring parent's bank statements (last 3 months)
      - Sponsoring parent's ITR for 2 years
      - Notarised affidavit of financial support
      - NOC from educational institution
    homemaker:
      - Spouse's bank statements for the last 3 months
      - Spouse's ITR for 2 years
      - Notarised affidavit of financial support from spouse
      - Marriage certificate
    retired:
      - Pension slips for the last 3 months (or pension passbook)
      - Bank statements for the last 3 months
      - ITR for 2 years (pension income, if applicable)
      - Pension sanction letter / retirement proof

health:
  vaccinations: Yellow Fever vaccination NOT required for entry into Brazil. Vaccination
    recommended (not mandatory) if visiting Amazon or Pantanal regions. Hepatitis A,
    Typhoid recommended.
  insurance: Comprehensive travel health insurance strongly recommended.
  notes: Dengue and Zika risk in many regions. Good private hospitals in major cities.
