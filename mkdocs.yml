site_name: Atlas
site_description: The verifiable visa database for Indian citizens.
site_url: https://atlas-wiki.pages.dev/

repo_url: https://github.com/shan8tanu/atlas-wiki
repo_name: shan8tanu/atlas-wiki
edit_uri: edit/main/

theme:
  name: material
  custom_dir: overrides
  favicon: assets/images/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - gen-files:
      scripts:
        - gen_pages.py

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shan8tanu/atlas-wiki

extra_javascript:
  - javascripts/map.js
  - javascripts/theme.js

extra_css:
  - stylesheets/map.css
  - stylesheets/theme.css

nav:
  - Home: index.md
  - Map: map.md
  - Countries:
    - Asia:
      - Cambodia: cambodia.md
      - China: china.md
      - Indonesia: indonesia.md
      - Japan: japan.md
      - Laos: laos.md
      - Malaysia: malaysia.md
      - Philippines: philippines.md
      - Singapore: singapore.md
      - South Korea: south-korea.md
      - Thailand: thailand.md
      - Vietnam: vietnam.md
    - Oceania:
      - Australia: australia.md
      - New Zealand: new-zealand.md
    - Europe:
      - France: france.md
      - Germany: germany.md
      - Greece: greece.md
      - Italy: italy.md
      - Netherlands: netherlands.md
      - Spain: spain.md
      - Switzerland: switzerland.md
      - Turkey: turkey.md
    - Middle East:
      - Qatar: qatar.md
      - Saudi Arabia: saudi-arabia.md
      - UAE: uae.md
    - Americas:
      - Brazil: brazil.md
      - United States: united-states.md
  - Guides:
    - Transit Visa Rules: guides/transit-visa-rules.md
  - Contribute: CONTRIBUTING.md