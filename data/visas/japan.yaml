country: Japan
iso_code: JP
visa_difficulty: 4
visa_type: Standard Visa
max_stay: 90 days
entry_type: "Single Entry"
visa_validity: "3 months from issue"
passport_validity_months: 6
blank_pages_required: 2
region: Asia
authority:
  name: Embassy of Japan, New Delhi
  processor: VFS Global
  official_portal: https://www.in.emb-japan.go.jp/itprtop_en/index.html
visa_types:
  standard_visa:
    label: Standard Visa
    documents:
      - Completed visa application form — printed, signed, and dated
      - Appointment confirmation slip from VFS Global / BLS / embassy
      - Confirmed return flight tickets (printed copy)
      - Proof of accommodation — hotel booking confirmation or invitation letter
      - Travel insurance covering the full stay duration
  evisa:
    label: e-Visa (where available)
    documents:
      - Online application form submitted via the official visa portal
      - Scanned copy of passport bio page — JPEG or PDF, clearly legible
      - Digital photograph — white background, JPEG, minimum 200 KB
      - Return flight booking reference number
      - Hotel or accommodation booking reference number
  long_term:
    label: Long-stay Visa
    documents:
      - Completed long-stay visa application (consulate-specific form)
      - Employer NOC confirming leave of absence for the full stay period
      - Proof of long-term accommodation — lease agreement or host invitation letter
      - Travel insurance covering the full extended stay duration
      - Sponsor letter or proof of fixed deposits / investment holdings

requirements:
  visa_fee_inr: 500
  processing_days: 4
  photo_specs:
    dimensions: 35x45mm
    bg_color: White
  financial_proof: ITR for the last 3 years and 6 months bank statement.
  financial_documents:
  - Bank statement for the last 6 months
  - ITR for the last 3 years
  occupation_documents:
    self_employed:
      - Bank statements for the last 6 months
      - ITR for 3 years (business income)
      - GST registration certificate + returns for 2 years
      - Business registration certificate / trade licence
      - CA-certified audited balance sheet for 2 years
    business_owner:
      - Personal + business bank statements for the last 6 months
      - Personal + company ITR for 3 years
      - Certificate of incorporation / MSME registration
      - Company audited financials for 2 years
      - Director identification proof (DIN)
    student:
      - Admission letter or valid student ID card
      - Sponsoring parent's bank statements (last 3 months)
      - Sponsoring parent's ITR for 3 years
      - Notarised affidavit of financial support
      - NOC from educational institution
    homemaker:
      - Spouse's bank statements for the last 6 months
      - Spouse's ITR for 3 years
      - Notarised affidavit of financial support from spouse
      - Marriage certificate
    retired:
      - Pension slips for the last 3 months (or pension passbook)
      - Bank statements for the last 6 months
      - ITR for 3 years (pension income, if applicable)
      - Pension sanction letter / retirement proof

health:
  vaccinations: Routine vaccinations sufficient. Japanese Encephalitis for extended
    rural stays.
  insurance: Travel health insurance strongly recommended — medical costs are high.
  notes: World-class healthcare. Pharmacies may not stock Western-brand medications.

# ── Section A: Jurisdiction Map ──────────────────────────────────
jurisdiction:
  - office: "Embassy of Japan, New Delhi"
    covers:
      - Delhi
      - Haryana
      - Himachal Pradesh
      - Jammu & Kashmir
      - Ladakh
      - Punjab
      - Rajasthan
      - Uttar Pradesh
      - Uttarakhand
  - office: "Consulate General of Japan, Mumbai"
    covers:
      - Goa
      - Gujarat
      - Maharashtra
      - Madhya Pradesh
      - Chhattisgarh
  - office: "Consulate General of Japan, Chennai"
    covers:
      - Andhra Pradesh
      - Karnataka
      - Kerala
      - Tamil Nadu
      - Telangana
      - Puducherry
  - office: "Consulate General of Japan, Kolkata"
    covers:
      - Assam
      - Bihar
      - Jharkhand
      - Meghalaya
      - Manipur
      - Mizoram
      - Nagaland
      - Odisha
      - Sikkim
      - Tripura
      - West Bengal
      - Arunachal Pradesh

# ── Section B: Transit Rules ─────────────────────────────────────
transit:
  visa_required: true
  exceptions:
    - "Shore pass available for cruise ship passengers (up to 72 hours)"
    - "Transit without visa if holding confirmed onward ticket departing within 24 hours and not leaving the airside transit area"
  notes: "Narita and Haneda airports have designated transit areas. Transit visa required if overnight stay is needed between flights."

# ── Section B: Visa Exemptions / Indian Privilege ────────────────
exemptions:
  - holding: "Valid US Visa (B1/B2)"
    grants: "Simplified processing — reduced document requirements"
    conditions: "Must be a valid, unexpired US B1/B2 visa with at least 6 months validity"
    source: https://www.in.emb-japan.go.jp/itprtop_en/index.html
  - holding: "Previous Japan visa (within 3 years)"
    grants: "Eligible for multiple-entry visa on next application"
    conditions: "Must have completed previous trip without overstay"
    source: https://www.in.emb-japan.go.jp/itprtop_en/index.html

# ── Section B: ECR / Non-ECR Rules ──────────────────────────────
ecr:
  applies: false
  note: "Japan does not require Emigration Clearance for Indian ECR passport holders on tourist visas."

# ── Section C: Biometrics ────────────────────────────────────────
biometrics:
  required: true
  validity_months: null
  note: "Biometrics (fingerprints and photograph) collected at the VFS Global application center. All applicants must appear in person."

