country: Australia
iso_code: AU
visa_difficulty: 4
visa_type: Standard Visa
max_stay: 12 months
entry_type: "Multiple Entry"
visa_validity: "12 months from issue"
passport_validity_months: 6
blank_pages_required: 2
region: Oceania
authority:
  name: Australian High Commission, New Delhi
  processor: VFS Global
  official_portal: https://immi.homeaffairs.gov.au/
# Citations (2026-07-10): every official source is bot-blocked to automated
# fetches — immi.homeaffairs.gov.au (403 on all paths incl. legacy ASPX),
# visa.vfsglobal.com/ind/en/aus (403), india.highcommission.gov.au (500),
# health.gov.au (timeout). All blocks flagged unverified pending human
# verification against the subclass 600 pages.
visa_types:
  standard_visa:
    label: Standard Visa
    unverified: true
    documents:
      - Completed visa application form — printed, signed, and dated
      - Appointment confirmation slip from VFS Global / BLS / embassy
      - Confirmed return flight tickets (printed copy)
      - Proof of accommodation — hotel booking confirmation or invitation letter
      - Travel insurance covering the full stay duration
  online:
    label: "Online (ImmiAccount)"
    # Relabelled from a mislabeled "e-Visa" tab (2026-07-10). India is NOT
    # eligible for Australia's ETA (601) or eVisitor (651), but the Visitor
    # visa (subclass 600) IS lodged online via ImmiAccount — that is the real
    # online route for Indian tourists, not a separate e-Visa product.
    # Unverified: immi.homeaffairs.gov.au bot-blocks automated fetches.
    unverified: true
    documents:
      - Online application lodged via ImmiAccount (immi.homeaffairs.gov.au)
      - Scanned copy of passport bio page — clear colour copy
      - Recent passport-style digital photograph
      - Confirmed return flight itinerary
      - Proof of accommodation for the full stay
  long_term:
    label: Long-stay Visa
    unverified: true
    documents:
      - Completed long-stay visa application (consulate-specific form)
      - Employer NOC confirming leave of absence for the full stay period
      - Proof of long-term accommodation — lease agreement or host invitation letter
      - Travel insurance covering the full extended stay duration
      - Sponsor letter or proof of fixed deposits / investment holdings

requirements:
  unverified: true
  visa_fee_inr: 10500
  processing_days: 25
  photo_specs:
    dimensions: 35x45mm
    bg_color: White
  financial_proof: Bank statements for the last 6 months, ITR for 2 years, employment
    proof, confirmed return ticket, and travel insurance. Apply for Visitor visa (subclass
    600) online.
  financial_documents:
  - Bank statements for the last 6 months
  - ITR for 2 years
  - Employment proof or letter from employer
  occupation_documents:
    self_employed:
      - Bank statements for the last 6 months
      - ITR for 2 years (business income)
      - GST registration certificate + returns for 2 years
      - Business registration certificate / trade licence
      - CA-certified audited balance sheet for 2 years
    business_owner:
      - Personal + business bank statements for the last 6 months
      - Personal + company ITR for 2 years
      - Certificate of incorporation / MSME registration
      - Company audited financials for 2 years
      - Director identification proof (DIN)
    student:
      - Admission letter or valid student ID card
      - Sponsoring parent's bank statements (last 3 months)
      - Sponsoring parent's ITR for 2 years
      - Notarised affidavit of financial support
      - NOC from educational institution
    homemaker:
      - Spouse's bank statements for the last 6 months
      - Spouse's ITR for 2 years
      - Notarised affidavit of financial support from spouse
      - Marriage certificate
    retired:
      - Pension slips for the last 3 months (or pension passbook)
      - Bank statements for the last 6 months
      - ITR for 2 years (pension income, if applicable)
      - Pension sanction letter / retirement proof

health:
  # insurance downgraded "mandatory" -> "strongly recommended" 2026-07-10
  # (founder-directed): Home Affairs states health insurance is recommended for
  # subclass 600, NOT a blanket legal requirement — it only becomes mandatory
  # if visa condition 8501 is imposed on a specific grant. Over-claiming a
  # requirement costs users money, so the safe accurate wording is "recommended".
  # Block stays unverified: immi.homeaffairs.gov.au bot-blocks automated fetches.
  unverified: true
  vaccinations: Routine vaccinations sufficient. Yellow Fever certificate if arriving
    from endemic area.
  insurance: Travel health insurance strongly recommended — most visitors have no
    access to Medicare, so you bear all medical costs. Becomes mandatory only if
    visa condition 8501 is imposed on your grant.
  notes: Sun protection essential. Be aware of dangerous wildlife in rural/coastal
    areas.
