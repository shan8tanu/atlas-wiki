name: CI — Validate & Build

# Push to main: fast checks only (validate.py + mkdocs build, ~30s, no external requests).
# Pull requests: full checks including htmlproofer dead-link scan.
# Weekly dead-link scan: handled separately by link-check.yml (runs every Monday).
#
# Rationale: htmlproofer makes external HTTP requests to every portal URL.
# If an embassy site is down, it blocks ALL pushes to main — including unrelated
# tool/config changes. Keeping htmlproofer out of the push path means a dead
# portal never blocks a Python fix or a CSS tweak.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate YAML data
        run: python validate.py

      - name: Build site (strict mode)
        # --strict turns warnings into errors so broken templates or bad YAML
        # cause the check to fail and block the PR.
        run: mkdocs build --strict

      - name: Check for dead official links (htmlproofer)
        # Only runs on pull_request events — not on direct pushes to main.
        # This keeps the push-to-main path fast and unblocked by external link failures.
        # The weekly link-check.yml cron handles ongoing link health monitoring.
        if: github.event_name == 'pull_request'
        uses: anishathalye/proof-html@v2
        with:
          directory: ./site
          # Disable HTML/CSS validation — errors come from Material theme internals
          # (e.g. autocomplete attributes, scrollbar-gutter CSS) that we don't control.
          check_html: false
          check_css: false
          check_external_hash: false
          enforce_https: true
          # Ignore GitHub links (private repo returns 404 to unauthenticated crawlers),
          # Google Fonts CDN (blocks HEAD requests from CI runners), and Japanese government
          # domains (.go.jp) — all Japanese govt sites block automated crawlers with 403 by
          # policy. This is structural bot-blocking, not a dead link.
          ignore_url_re: |
            ^https://github\.com/
            ^https://fonts\.(gstatic|googleapis)\.com
            \.go\.jp
