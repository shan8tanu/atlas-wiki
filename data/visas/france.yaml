# ── Section B: Transit Rules ─────────────────────────────────────
transit:
  visa_required: true
  exceptions:
    - "Airside Transit Visa (ATV) exemption if holding valid visa or residence permit from EU/EEA, US, Canada, Japan, or UK"
    - "Transit without visa if connecting flight departs within 24 hours and passenger does not leave the international zone"
  notes: "Paris CDG has an international transit zone. Passengers transiting to non-Schengen destinations may not need to clear immigration."

# ── Section B: Visa Exemptions / Indian Privilege ────────────────
exemptions:
  - holding: "Valid Schengen Visa (any country)"
    grants: "Can enter France without a separate French visa"
    conditions: "Schengen visa must be valid and issued by any Schengen member state"
    source: https://france-visas.gouv.fr/
  - holding: "Valid US Visa + France transit"
    grants: "Airside transit without visa for flights to/from the Americas"
    conditions: "Must hold a valid US visa and transit within 24 hours. Cannot leave the international zone."
    source: https://france-visas.gouv.fr/
  - holding: "French Residence Permit (Titre de Séjour)"
    grants: "Re-entry without visa during permit validity"
    conditions: "Residence permit must be valid. Does not apply to récépissé (receipt)."
    source: https://france-visas.gouv.fr/

# ── Section B: ECR / Non-ECR Rules ──────────────────────────────
ecr:
  applies: true
  note: "ECR passport holders travelling to France for employment must obtain Emigration Clearance from the Protector of Emigrants. Tourist and business visa applicants are not affected."

# ── Section C: Biometrics ────────────────────────────────────────
biometrics:
  required: true
  validity_months: 59
  note: "Schengen VIS biometrics (10 fingerprints + photograph) valid for 59 months. If captured within the last 59 months at any Schengen consulate, you do not need to appear in person again."

