# Transit Visa Rules for Indian Passport Holders
# This file is the data source for the Transit Rules Guide page.
# YAML → Jinja2 template (transit-guide.md.jinja) → generated wiki page.

hubs:
  # ── Schengen Hubs ──────────────────────────────────────────────

  - airport_name: "Frankfurt Airport"
    iata_code: "FRA"
    country: "Germany"
    iso_code: "DE"
    transit_zone: "Schengen"
    default_rule: "Indian passport holders require an Airport Transit Visa (ATV) for airside transit through Frankfurt unless an exemption applies."
    exemptions:
      - description: "Hold a valid visa or residence permit issued by a Schengen member state"
      - description: "Hold a valid visa or residence permit issued by the United States, Canada, or Japan"
      - description: "Hold a valid visa or residence permit issued by the United Kingdom or Ireland"
      - description: "Hold a valid visa issued by Andorra, Monaco, or San Marino"
      - description: "Are a family member of an EU/EEA citizen exercising freedom of movement rights"
      - description: "Hold a diplomatic or service passport"
    terminal_change_note: "If your connection requires changing terminals via landside (outside the secure area), a full Schengen short-stay visa is required regardless of exemptions above."
    same_ticket_note: "Exemptions apply only when both flights are on the same booking (single PNR). Separate tickets may require a Schengen visa even for airside transit."
    max_transit_hours: null
    source_name: "Federal Foreign Office of Germany"
    source_url: "https://placeholder.example.com/germany-transit"  # PLACEHOLDER — verify before production
    last_verified: "2026-03-27"  # Date of sample data creation
    notes: null

  - airport_name: "Paris Charles de Gaulle Airport"
    iata_code: "CDG"
    country: "France"
    iso_code: "FR"
    transit_zone: "Schengen"
    default_rule: "Indian passport holders require an Airport Transit Visa (ATV) for airside transit through Paris CDG unless an exemption applies."
    exemptions:
      - description: "Hold a valid visa or residence permit issued by a Schengen member state"
      - description: "Hold a valid visa or residence permit issued by the United States, Canada, or Japan"
      - description: "Hold a valid visa or residence permit issued by the United Kingdom or Ireland"
      - description: "Hold a valid visa issued by Andorra, Monaco, or San Marino"
      - description: "Are a family member of an EU/EEA citizen exercising freedom of movement rights"
      - description: "Hold a diplomatic or service passport"
    terminal_change_note: "Connections within Terminal 2E and 2F can be made airside. All other terminal changes (e.g., Terminal 1 to Terminal 2) require passing through French border control — a full Schengen short-stay visa is needed."
    same_ticket_note: "Exemptions apply only when both flights are on the same booking (single PNR). Separate tickets may require a Schengen visa even for airside transit."
    max_transit_hours: null
    source_name: "Ministry for Europe and Foreign Affairs (France)"
